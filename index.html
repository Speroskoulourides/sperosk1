<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SNK Luxury Real Estate</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
--gold: #C9A961;
--gold-dark: #A68844;
--gold-light: #E5D4A1;
--black: #0A0A0A;
}
body {
font-family: 'Montserrat', sans-serif;
background-color: var(--black);
color: #fff;
}
h1, .serif {
font-family: 'Cormorant Garamond', serif;
}
.gold-gradient {
background: linear-gradient(135deg, var(--gold-light) 0%, var(--gold) 50%, var(--gold-dark) 100%);
-webkit-background-clip: text;
-webkit-text-fill-color: transparent;
background-clip: text;
}
.btn-gold {
background: linear-gradient(135deg, var(--gold-dark) 0%, var(--gold) 50%, var(--gold-light) 100%);
color: var(--black);
font-weight: 600;
transition: all 0.3s ease;
}
.btn-gold:hover {
transform: translateY(-2px);
box-shadow: 0 10px 25px rgba(201, 169, 97, 0.3);
}
.glass-effect {
background: rgba(26, 26, 26, 0.6);
backdrop-filter: blur(12px);
border: 1px solid rgba(201, 169, 97, 0.2);
}
.input-gold {
background: rgba(26, 26, 26, 0.8);
border: 1px solid rgba(201, 169, 97, 0.3);
color: white;
transition: all 0.3s ease;
}
.input-gold:focus {
border-color: var(--gold);
box-shadow: 0 0 15px rgba(201, 169, 97, 0.2);
outline: none;
}
</style>
</head>
<body>
<nav class="fixed w-full z-50">
<div class="glass-effect">
<div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
<div class="flex justify-between items-center h-20">
<div class="flex items-center">
<h1 class="text-3xl font-bold serif">
<span class="gold-gradient">SNK</span>
<span class="text-white ml-2 text-xl font-light tracking-widest">LUXURY</span>
</h1>
</div>
<div class="flex items-center">
<a href="presentation.html" class="btn-gold px-6 py-2.5 rounded-full text-sm tracking-wider">BROCHURE</a>
</div>
</div>
</div>
</div>
</div>
</nav>
<section class="min-h-screen flex items-center justify-center px-4 pt-24">
<div class="max-w-2xl w-full">
<div class="glass-effect rounded-2xl p-8 md:p-12">
<h2 class="serif text-4xl md:text-5xl font-bold text-center mb-3">
<span class="gold-gradient">Contact Us</span>
</h2>
<p class="text-gray-400 text-center mb-8">Επικοινωνήστε μαζί μας για το ακίνητο των ονείρων σας</p>
<form class="space-y-6">
<div>
<input type="text" placeholder="Ονοματεπώνυμο" class="input-gold w-full px-5 py-4 rounded-lg">
</div>
<div>
<input type="email" placeholder="Email" class="input-gold w-full px-5 py-4 rounded-lg">
</div>
<div>
<input type="tel" placeholder="Τηλέφωνο" class="input-gold w-full px-5 py-4 rounded-lg">
</div>
<div>
<textarea rows="4" placeholder="Μήνυμα" class="input-gold w-full px-5 py-4 rounded-lg"></textarea>
</div>
<button type="submit" class="btn-gold w-full py-4 rounded-lg text-lg tracking-wider">
ΑΠΟΣΤΟΛΗ
</button>
</form>
<div class="mt-8 pt-8 border-t border-gray-800 text-center">
<div class="flex justify-center gap-6 text-gray-400">
<a href="tel:+306985821148" class="hover:text-white transition">
<i class="fas fa-phone mr-2"></i>Call Us
</a>
<a href="mailto:sperosk1@gmail.com" class="hover:text-white transition">
<i class="fas fa-envelope mr-2"></i>Email
</a>
</div>
</div>
</div>
</div>
</section>
</body>
</html>
